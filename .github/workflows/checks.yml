name: Checks

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose up -d --build
        env:
          DB_HOST: db
          DB_NAME: workflow_db
          DB_USER: workflow_user
          DB_PASS: workflow_pass
          SECRET_KEY: dev-secret-key

      - name: Wait for database
        run: docker compose exec -T backend sh -c "python manage.py wait_for_db"

      - name: Run tests
        run: docker compose exec -T backend sh -c "python manage.py test"

      - name: Run lint
        run: docker compose exec -T backend sh -c "flake8 ."

      - name: Shutdown
        if: always()
        run: docker compose down

  frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Run lint
        run: |
          cd frontend
          npm run lint
